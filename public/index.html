<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>胡了么 - 国标麻将计番助手</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>和了么 - 国标麻将计番助手</h1>
      <p id="versionBadge">版本信息加载中...</p>
      <p>手动输入 14 张手牌与和牌上下文，点击“计算番数”获取结果。</p>

      <section class="panel">
        <h2>手牌输入</h2>
        <div id="tileGrid" class="tile-grid"></div>
        <p class="hint">牌码示例：1W 9T 3B E S Wn N R G Wh</p>
      </section>

      <section class="panel">
        <h2>和牌上下文</h2>
        <div class="context-grid">
          <label>和牌方式
            <select id="winType">
              <option value="zimo">自摸</option>
              <option value="dianhe">点和</option>
            </select>
          </label>
          <label>门前/副露
            <select id="handState">
              <option value="menqian">门前清</option>
              <option value="fulu">副露</option>
            </select>
          </label>
          <label>杠类型
            <select id="kongType">
              <option value="none">无杠</option>
              <option value="an">暗杠</option>
              <option value="ming">明杠</option>
              <option value="bu">补杠</option>
            </select>
          </label>
          <label>时机事件
            <select id="timingEvent">
              <option value="none">无</option>
              <option value="haidi">海底</option>
              <option value="hedi">河底</option>
              <option value="gangshang">杠上</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="calculateBtn">计算番数</button>
          <button id="resetBtn" class="secondary">重置</button>
        </div>
      </section>

      <section class="panel">
        <h2>错误信息</h2>
        <ul id="errors" class="errors"></ul>
      </section>

      <section class="panel">
        <h2>计算结果</h2>
        <div id="output" class="result-wrap">
          <p class="placeholder">请先输入手牌与上下文，再点击“计算番数”。</p>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
