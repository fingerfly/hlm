<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>和了么 - 国标麻将计番助手</title>
    <link rel="icon" type="image/svg+xml" href="./favicon-traditional.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles-base.css" />
    <link rel="stylesheet" href="./styles-components.css" />
    <link rel="stylesheet" href="./styles-modals.css" />
    <link rel="stylesheet" href="./styles-responsive.css" />
  </head>
  <body>
    <!-- Home screen keeps primary actions always visible on mobile. -->
    <main class="container">
      <header class="nav-bar">
        <span></span>
        <button id="moreBtn" class="icon-btn" aria-label="更多">...</button>
      </header>
      <p id="versionBadge" class="version-badge">版本信息加载中...</p>

      <section class="card">
        <div class="card-top">
          <h2>当前手牌 <span id="tileCount">0/14</span></h2>
        </div>
        <div id="tilePreview" class="tile-preview"></div>
        <div id="slotContextMenu" class="slot-context-menu" role="menu" hidden>
          <button type="button" data-context-action="undo_last"
            data-menu-level="parent" role="menuitem">撤销最近一次</button>
          <button type="button" data-context-action="undo_slot"
            data-menu-level="parent" role="menuitem">撤销当前槽位</button>
          <button type="button" data-context-action="single" role="menuitem">单张</button>
          <button type="button" data-context-action="pair" role="menuitem">对子</button>
          <button type="button" data-context-action="pung" role="menuitem">刻子</button>
          <details class="context-chow-submenu">
            <summary>顺子</summary>
            <div class="context-chow-options">
              <button type="button" data-context-action="chow_front">前位</button>
              <button type="button" data-context-action="chow_middle">中位</button>
              <button type="button" data-context-action="chow_back">后位</button>
            </div>
          </details>
          <div class="context-suit-row">
            <button type="button" data-context-action="tab" data-tab="W"
              data-menu-level="parent">万</button>
            <button type="button" data-context-action="tab" data-tab="T"
              data-menu-level="parent">条</button>
            <button type="button" data-context-action="tab" data-tab="B"
              data-menu-level="parent">筒</button>
            <button type="button" data-context-action="tab" data-tab="Z"
              data-menu-level="parent">字牌</button>
          </div>
        </div>
        <button id="openPickerBtn" class="primary-btn">继续选牌</button>
      </section>

      <section class="card">
        <h2>和牌条件</h2>
        <p id="contextSummary" class="summary-text">自摸 · 门前清 · 无杠</p>
        <button id="openContextBtn" class="ghost-btn">可选：编辑条件</button>
      </section>

      <footer class="sticky-footer">
        <p id="readyHint" class="hint">请先选满 14 张牌</p>
        <button id="calculateBtn" class="primary-btn" disabled>计算番数</button>
      </footer>
    </main>

    <!-- Bottom-sheet modal keeps picker reachable with one thumb. -->
    <section id="pickerModal" class="modal">
      <div class="sheet">
        <div class="sheet-header">
          <h3>选择手牌</h3>
          <button data-close="picker" class="ghost-btn">完成</button>
        </div>
        <div class="picker-tabs">
          <button data-tab="W" class="tab-btn active">万</button>
          <button data-tab="T" class="tab-btn">条</button>
          <button data-tab="B" class="tab-btn">筒</button>
          <button data-tab="Z" class="tab-btn">字牌</button>
        </div>
        <div class="pattern-actions">
          <button data-pattern-action="single" class="ghost-btn active">单张</button>
          <details class="pattern-secondary">
            <summary class="ghost-btn">组合</summary>
            <div class="pattern-secondary-grid">
              <button data-pattern-action="pair" class="ghost-btn">对子</button>
              <button data-pattern-action="pung" class="ghost-btn">刻子</button>
              <button data-pattern-action="chow_front" class="ghost-btn">顺子前位</button>
              <button data-pattern-action="chow_middle" class="ghost-btn">顺子中位</button>
              <button data-pattern-action="chow_back" class="ghost-btn">顺子后位</button>
            </div>
          </details>
        </div>
        <p id="pickerActionHint" class="summary-text">当前快捷动作：单张</p>
        <div id="tilePickerGrid" class="tile-picker-grid"></div>
        <div class="sheet-footer">
          <span id="pickerCount">已选 0/14</span>
          <div class="inline-actions">
            <button id="pickerDeleteBtn" class="ghost-btn">删除选中</button>
            <button id="pickerUndoBtn" class="ghost-btn">撤销</button>
            <details class="picker-more-actions">
              <summary class="ghost-btn">更多</summary>
              <div class="picker-more-actions-panel">
                <button id="pickerClearBtn" class="ghost-btn">清空</button>
              </div>
            </details>
          </div>
        </div>
      </div>
    </section>

    <!-- Context settings are isolated to avoid accidental edits. -->
    <section id="contextModal" class="modal">
      <div class="sheet">
        <div class="sheet-header">
          <h3>和牌条件</h3>
          <button data-close="context" class="ghost-btn">应用</button>
        </div>
        <div class="preset-cards">
          <button data-preset="zimo-menqian" class="preset-card">自摸 + 门前清</button>
          <button data-preset="dianhe-menqian" class="preset-card">点和 + 门前清</button>
          <button data-preset="dianhe-fulu" class="preset-card">点和 + 副露</button>
        </div>
        <p class="context-section-label">自定义</p>
        <div class="context-segmented">
          <span class="context-label">和牌方式</span>
          <div class="segmented-row" role="radiogroup" aria-label="和牌方式">
            <input type="radio" id="winTypeZimo" name="winType" value="zimo" checked />
            <label for="winTypeZimo">自摸</label>
            <input type="radio" id="winTypeDianhe" name="winType" value="dianhe" />
            <label for="winTypeDianhe">点和</label>
          </div>
        </div>
        <input type="hidden" id="winType" value="zimo" />
        <div class="context-segmented">
          <span class="context-label">门前/副露</span>
          <div class="segmented-row" role="radiogroup" aria-label="门前副露">
            <input type="radio" id="handStateMenqian" name="handState" value="menqian" checked />
            <label for="handStateMenqian">门前清</label>
            <input type="radio" id="handStateFulu" name="handState" value="fulu" />
            <label for="handStateFulu">副露</label>
          </div>
        </div>
        <input type="hidden" id="handState" value="menqian" />
        <details class="context-advanced">
          <summary>高级条件</summary>
          <div class="context-segmented">
            <span class="context-label">杠类型</span>
            <div class="segmented-row" role="radiogroup" aria-label="杠类型">
              <input type="radio" id="kongNone" name="kongType" value="none" checked />
              <label for="kongNone">无杠</label>
              <input type="radio" id="kongAn" name="kongType" value="an" />
              <label for="kongAn">暗杠</label>
              <input type="radio" id="kongMing" name="kongType" value="ming" />
              <label for="kongMing">明杠</label>
              <input type="radio" id="kongBu" name="kongType" value="bu" />
              <label for="kongBu">补杠</label>
            </div>
          </div>
          <input type="hidden" id="kongType" value="none" />
          <div class="context-segmented">
            <span class="context-label">时机事件</span>
            <div class="segmented-row" role="radiogroup" aria-label="时机事件">
              <input type="radio" id="timingNone" name="timingEvent" value="none" checked />
              <label for="timingNone">无</label>
              <input type="radio" id="timingHaidi" name="timingEvent" value="haidi" />
              <label for="timingHaidi">海底捞月</label>
              <input type="radio" id="timingHedi" name="timingEvent" value="hedi" />
              <label for="timingHedi">河底捞鱼</label>
              <input type="radio" id="timingGangshang" name="timingEvent" value="gangshang" />
              <label for="timingGangshang">杠上开花</label>
            </div>
          </div>
          <input type="hidden" id="timingEvent" value="none" />
        </details>
      </div>
    </section>

    <!-- Result modal: total, breakdown, explanation inline. -->
    <section id="resultModal" class="modal">
      <div class="sheet">
        <div class="sheet-header">
          <h3>结果</h3>
          <button data-close="result" class="ghost-btn">关闭</button>
        </div>
        <p id="resultStatus" class="status-pill">未和牌</p>
        <p id="resultTotalFan" class="total-fan">0 番</p>
        <h4>和牌分组</h4>
        <div id="resultMeldRows" class="meld-rows"></div>
        <h4>番种明细</h4>
        <ul id="hitPreview" class="fan-list fan-breakdown"></ul>
        <p id="resultExplanation" class="result-explanation summary-text"></p>
        <div class="inline-actions">
          <button id="openInfoBtn" class="ghost-btn">详细解释</button>
          <button id="playAgainBtn" class="ghost-btn">再来一手</button>
        </div>
      </div>
    </section>

    <!-- Info modal shows full explanation lists for auditability. -->
    <section id="infoModal" class="modal">
      <div class="sheet">
        <div class="sheet-header">
          <h3>详细解释</h3>
          <button data-close="info" class="ghost-btn">关闭</button>
        </div>
        <h4>命中番种</h4>
        <ul id="infoHitList" class="fan-list"></ul>
        <h4>排除番种</h4>
        <ul id="infoExcludedList" class="fan-list"></ul>
        <h4>解释</h4>
        <p id="infoExplanation" class="summary-text"></p>
      </div>
    </section>
    <script type="module" src="./app.js"></script>
  </body>
</html>
