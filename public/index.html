<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>和了么 - 国标麻将计番助手</title>
    <link rel="icon" type="image/svg+xml" href="./favicon-traditional.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles-base.css" />
    <link rel="stylesheet" href="./styles-components.css" />
    <link rel="stylesheet" href="./styles-modals.css" />
    <link rel="stylesheet" href="./styles-responsive.css" />
  </head>
  <body>
    <div id="appSplash" class="app-splash" aria-live="polite"
      aria-label="应用启动画面">
      <div class="app-splash-motif" aria-hidden="true"></div>
      <div class="app-splash-card">
        <h1 class="app-splash-title">和了么</h1>
        <p class="app-splash-subtitle">国标麻将计番</p>
        <ul class="app-splash-values">
          <li>手牌录入</li>
          <li>番种拆解</li>
          <li>条件与规则说明</li>
        </ul>
        <p id="splashVersion" class="app-splash-version"></p>
      </div>
    </div>
    <!-- Home screen keeps primary actions always visible on mobile. -->
    <main class="container">
      <header class="nav-bar">
        <span></span>
        <button id="moreBtn" class="icon-btn" aria-label="重置会话条件">...</button>
      </header>
      <p id="versionBadge" class="version-badge">版本信息加载中...</p>

      <section class="card">
        <div class="card-top">
          <h2>当前手牌 <span id="tileCount">0/14</span></h2>
        </div>
        <div id="tilePreview" class="tile-preview"></div>
        <div class="card-actions">
          <button id="openPickerBtn" class="primary-btn">继续选牌</button>
          <button id="clearHandBtn" class="ghost-btn">清空</button>
        </div>
      </section>

      <footer class="sticky-footer">
        <p id="wizardStepHint" class="hint">步骤 1/2：选择 14 张手牌</p>
        <p id="contextSummary" class="hint">自摸 · 门前清 · 无杠</p>
        <p id="readyHint" class="hint">请先选满 14 张牌</p>
        <div class="wizard-controls">
          <button id="wizardBackBtn" class="ghost-btn">上一步</button>
          <button id="wizardNextBtn" class="ghost-btn">下一步</button>
        </div>
      </footer>
    </main>

    <!-- Bottom-sheet modal keeps picker reachable with one thumb. -->
    <section id="pickerModal" class="modal">
      <div class="sheet">
        <div class="sheet-header">
          <h3>选择手牌</h3>
          <button data-close="picker" class="ghost-btn">完成</button>
        </div>
        <div class="picker-tabs">
          <button data-tab="W" class="tab-btn active">万</button>
          <button data-tab="T" class="tab-btn">条</button>
          <button data-tab="B" class="tab-btn">筒</button>
          <button data-tab="Z" class="tab-btn">字牌</button>
        </div>
        <div id="tileContextMenu" class="tile-context-menu" hidden
          role="menu" aria-label="选择添加方式">
          <button type="button" data-context-action="single" class="ghost-btn">
            单张
          </button>
          <button type="button" data-context-action="pair" class="ghost-btn">
            对子
          </button>
          <button type="button" data-context-action="pung" class="ghost-btn">
            刻子
          </button>
          <div class="context-chow-submenu">
            <button type="button" data-context-action="chow_front"
              class="ghost-btn">顺子前位</button>
            <button type="button" data-context-action="chow_middle"
              class="ghost-btn">顺子中位</button>
            <button type="button" data-context-action="chow_back"
              class="ghost-btn">顺子后位</button>
          </div>
        </div>
        <div id="tilePickerGrid" class="tile-picker-grid"></div>
        <div class="sheet-footer">
          <span id="pickerCount">已选 0/14</span>
          <div class="inline-actions">
            <button id="pickerClearBtn" class="ghost-btn">清空</button>
            <button id="pickerUndoBtn" class="ghost-btn">撤销</button>
            <button id="pickerDeleteBtn" class="ghost-btn">删除选中</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Context settings: grouped form (HIG-oriented). -->
    <section id="contextModal" class="modal">
      <div class="sheet context-sheet">
        <div class="sheet-header context-sheet-header">
          <h3>和牌条件</h3>
        </div>
        <div class="context-sheet-body">
          <section class="context-group" aria-labelledby="ctxWinHandTitle">
            <h4 id="ctxWinHandTitle" class="context-group-title">和牌方式与门前状态</h4>
            <div class="context-segmented">
              <span class="context-label">和牌方式</span>
              <div class="segmented-row" role="radiogroup" aria-label="和牌方式">
                <input type="radio" id="winTypeZimo" name="winType" value="zimo"
                  checked />
                <label for="winTypeZimo">自摸</label>
                <input type="radio" id="winTypeDianhe" name="winType"
                  value="dianhe" />
                <label for="winTypeDianhe">点和</label>
              </div>
            </div>
            <input type="hidden" id="winType" value="zimo" />
            <div class="context-segmented">
              <span class="context-label">门前/副露</span>
              <div class="segmented-row" role="radiogroup" aria-label="门前副露">
                <input type="radio" id="handStateMenqian" name="handState"
                  value="menqian" checked />
                <label for="handStateMenqian">门前清</label>
                <input type="radio" id="handStateFulu" name="handState"
                  value="fulu" />
                <label for="handStateFulu">副露</label>
              </div>
            </div>
            <input type="hidden" id="handState" value="menqian" />
          </section>
          <section class="context-group" aria-labelledby="ctxFlowerTitle">
            <h4 id="ctxFlowerTitle" class="context-group-title">花牌</h4>
            <p class="context-hint">花牌张数不计入 14 张手牌（每花 1 番）。</p>
            <div class="stepper-row">
              <button type="button" id="flowerDec" class="stepper-btn"
                aria-label="减少花牌张数">−</button>
              <span id="flowerCountLabel" class="stepper-value"
                aria-live="polite">0</span>
              <input type="hidden" id="flowerCount" value="0" />
              <button type="button" id="flowerInc" class="stepper-btn"
                aria-label="增加花牌张数">+</button>
            </div>
          </section>
          <section class="context-group" aria-labelledby="ctxKongTitle">
            <h4 id="ctxKongTitle" class="context-group-title">杠（组数）</h4>
            <p class="context-hint">暗杠与明杠组数合计不超过 4。</p>
            <div class="stepper-field">
              <span class="stepper-field-label">暗杠</span>
              <div class="stepper-row">
                <button type="button" id="kongAnDec" class="stepper-btn"
                  aria-label="减少暗杠组数">−</button>
                <span id="kongAnLabel" class="stepper-value"
                  aria-live="polite">0</span>
                <input type="hidden" id="kongAnCount" value="0" />
                <button type="button" id="kongAnInc" class="stepper-btn"
                  aria-label="增加暗杠组数">+</button>
              </div>
            </div>
            <div class="stepper-field">
              <span class="stepper-field-label">明杠</span>
              <div class="stepper-row">
                <button type="button" id="kongMingDec" class="stepper-btn"
                  aria-label="减少明杠组数">−</button>
                <span id="kongMingLabel" class="stepper-value"
                  aria-live="polite">0</span>
                <input type="hidden" id="kongMingCount" value="0" />
                <button type="button" id="kongMingInc" class="stepper-btn"
                  aria-label="增加明杠组数">+</button>
              </div>
            </div>
            <input type="hidden" id="kongType" value="none" />
          </section>
          <section class="context-group" aria-labelledby="ctxTimingTitle">
            <h4 id="ctxTimingTitle" class="context-group-title">时机事件</h4>
            <div class="radio-list timing-hig-list" role="radiogroup"
              aria-label="时机事件">
              <label class="radio-list-item timing-hig-row">
                <input type="radio" name="timingEvent" value="none" checked />
                <span class="timing-hig-label">无</span>
                <span class="timing-hig-check" aria-hidden="true">✓</span>
              </label>
              <label class="radio-list-item timing-hig-row">
                <input type="radio" name="timingEvent" value="haidi" />
                <span class="timing-hig-label">海底捞月</span>
                <span class="timing-hig-check" aria-hidden="true">✓</span>
              </label>
              <label class="radio-list-item timing-hig-row">
                <input type="radio" name="timingEvent" value="hedi" />
                <span class="timing-hig-label">河底捞鱼</span>
                <span class="timing-hig-check" aria-hidden="true">✓</span>
              </label>
              <label class="radio-list-item timing-hig-row">
                <input type="radio" name="timingEvent" value="gangshang" />
                <span class="timing-hig-label">杠上开花</span>
                <span class="timing-hig-check" aria-hidden="true">✓</span>
              </label>
              <label class="radio-list-item timing-hig-row">
                <input type="radio" name="timingEvent" value="qianggang" />
                <span class="timing-hig-label">抢杠和</span>
                <span class="timing-hig-check" aria-hidden="true">✓</span>
              </label>
            </div>
            <input type="hidden" id="timingEvent" value="none" />
          </section>
        </div>
        <div class="context-sheet-footer">
          <button type="button" data-close="context"
            class="primary-btn context-apply-btn">
            应用
          </button>
        </div>
      </div>
    </section>

    <!-- Result modal: sticky summary + scrollable breakdown. -->
    <section id="resultModal" class="modal">
      <div class="sheet result-sheet">
        <div class="result-sticky-top">
          <div class="sheet-header result-sheet-header">
            <h3>结果</h3>
            <button type="button" data-close="result" class="ghost-btn">
              关闭
            </button>
          </div>
          <p id="resultStatus" class="status-pill">未和牌</p>
          <p id="resultTotalFan" class="total-fan">0 番</p>
        </div>
        <div class="result-scroll">
          <section class="result-section" aria-labelledby="resultMeldHeading">
            <h4 id="resultMeldHeading" class="result-section-title">和牌分组</h4>
            <div id="resultMeldRows" class="meld-rows"></div>
          </section>
          <section class="result-section" aria-labelledby="resultFanHeading">
            <h4 id="resultFanHeading" class="result-section-title">番种明细</h4>
            <ul id="hitPreview" class="fan-list fan-breakdown"></ul>
          </section>
          <p id="resultExplanation" class="result-explanation summary-text"></p>
          <div class="inline-actions">
            <button type="button" id="playAgainBtn" class="ghost-btn">
              再来一手
            </button>
          </div>
        </div>
      </div>
    </section>
    <script type="module" src="./app.js"></script>
  </body>
</html>
