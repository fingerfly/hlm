name: Deploy Safety Matrix

on:
  push:
    branches:
      - main
    paths:
      - "scripts/deploy*.js"
      - "src/config/deploy*.js"
      - "tests/unit/deploy*.test.js"
      - "package.json"
      - ".github/workflows/deploy-safety-matrix.yml"
  pull_request:
    branches:
      - main
    paths:
      - "scripts/deploy*.js"
      - "src/config/deploy*.js"
      - "tests/unit/deploy*.test.js"
      - "package.json"
      - ".github/workflows/deploy-safety-matrix.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-safety:
    name: Deploy safety (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run deploy-focused runtime tests
        run: node --test tests/unit/deployRuntime.test.js

      - name: Run deploy-focused CLI tests
        run: |
          node --test tests/unit/deployCli.prompts.test.js
          node --test tests/unit/deployCli.release.core.test.js
          node --test tests/unit/deployCli.release.bump.test.js
