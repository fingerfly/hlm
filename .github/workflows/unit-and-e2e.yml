# Purpose: Run Node test suite + Playwright smoke on push/PR (main).
name: Unit and E2E

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium webkit --with-deps

      - name: Run full test suite
        run: npm test

      - name: Complexity gate
        run: npm run quality:complexity
